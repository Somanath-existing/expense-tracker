<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseFlow — Personal Expense Tracker</title>
  <meta name="description" content="Track and manage your personal expenses beautifully." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <h1>Expense<span>Flow</span></h1>
      </div>
      <button id="addExpenseBtn" class="btn btn-primary btn-glow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Add Expense</span>
      </button>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="main-content">
    <div class="dashboard-grid">

      <!-- LEFT: Monthly Summary -->
      <aside class="summary-panel">
        <div class="panel-card glass-card">
          <div class="summary-header">
            <h2>Monthly Overview</h2>
            <div class="month-nav">
              <button id="prevMonth" class="icon-btn" title="Previous month">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <span id="currentMonth" class="month-label">June 2026</span>
              <button id="nextMonth" class="icon-btn" title="Next month">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          </div>

          <div class="total-card">
            <span class="total-label">Total Spent</span>
            <span class="total-amount" id="totalAmount">₹0.00</span>
          </div>

          <div class="chart-container" id="chartContainer">
            <svg id="donutChart" viewBox="0 0 200 200" class="donut-chart"></svg>
            <div class="chart-center" id="chartCenter">
              <span class="chart-center-label">expenses</span>
              <span class="chart-center-count" id="chartCenterCount">0</span>
            </div>
            <div class="chart-empty" id="chartEmpty">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.25"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <p>No expenses this month</p>
            </div>
          </div>

          <div class="category-breakdown" id="categoryBreakdown">
            <!-- rendered by JS -->
          </div>
        </div>
      </aside>

      <!-- RIGHT: Expense List -->
      <section class="expenses-panel">
        <!-- Filters -->
        <div class="filters-bar glass-card">
          <div class="filter-row">
            <div class="search-wrap">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" placeholder="Search expenses…" class="input" />
            </div>
            <select id="categoryFilter" class="input select">
              <option value="">All Categories</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Bills">📄 Bills</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="filter-row">
            <div class="date-range">
              <label class="date-label">From</label>
              <input type="date" id="dateFrom" class="input" />
            </div>
            <div class="date-range">
              <label class="date-label">To</label>
              <input type="date" id="dateTo" class="input" />
            </div>
            <button id="clearFilters" class="btn btn-ghost" title="Clear all filters">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Clear
            </button>
          </div>
        </div>

        <!-- List -->
        <div id="expensesList" class="expenses-list">
          <!-- rendered by JS -->
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-illustration">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
              <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          <h3 id="emptyTitle">No expenses yet</h3>
          <p id="emptySubtitle">Click "Add Expense" to start tracking your spending.</p>
        </div>
      </section>
    </div>
  </main>

  <!-- ========== ADD/EDIT MODAL ========== -->
  <div id="expenseModal" class="modal-overlay" style="display:none;">
    <div class="modal-container glass-card">
      <div class="modal-header">
        <h2 id="modalTitle">Add Expense</h2>
        <button id="modalClose" class="icon-btn" title="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="expenseForm" novalidate>
        <div class="form-group">
          <label for="titleInput">Title <span class="required">*</span></label>
          <input type="text" id="titleInput" class="input" placeholder='e.g. "Coffee at Starbucks"' maxlength="200" required />
          <span class="field-error" id="titleError"></span>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label for="amountInput">Amount (₹) <span class="required">*</span></label>
            <input type="number" id="amountInput" class="input" placeholder="0.00" step="0.01" min="0.01" required />
            <span class="field-error" id="amountError"></span>
          </div>
          <div class="form-group">
            <label for="dateInput">Date <span class="required">*</span></label>
            <input type="date" id="dateInput" class="input" required />
            <span class="field-error" id="dateError"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Category <span class="required">*</span></label>
          <div class="category-pills" id="categoryPills">
            <label class="pill" data-cat="Food"><input type="radio" name="category" value="Food" /><span>🍔 Food</span></label>
            <label class="pill" data-cat="Transport"><input type="radio" name="category" value="Transport" /><span>🚗 Transport</span></label>
            <label class="pill" data-cat="Shopping"><input type="radio" name="category" value="Shopping" /><span>🛍️ Shopping</span></label>
            <label class="pill" data-cat="Bills"><input type="radio" name="category" value="Bills" /><span>📄 Bills</span></label>
            <label class="pill" data-cat="Entertainment"><input type="radio" name="category" value="Entertainment" /><span>🎬 Entertainment</span></label>
            <label class="pill" data-cat="Other"><input type="radio" name="category" value="Other" /><span>📦 Other</span></label>
          </div>
          <span class="field-error" id="categoryError"></span>
        </div>
        <div class="form-group">
          <label for="noteInput">Note <span class="optional">(optional)</span></label>
          <textarea id="noteInput" class="input textarea" placeholder="Any additional details…" maxlength="1000" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="submitBtn" class="btn btn-primary btn-glow">
            <span id="submitBtnText">Save Expense</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== DELETE MODAL ========== -->
  <div id="deleteModal" class="modal-overlay" style="display:none;">
    <div class="modal-container glass-card modal-small">
      <div class="delete-graphic">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h3>Delete this expense?</h3>
      <p class="delete-desc">This action cannot be undone.</p>
      <div class="form-actions">
        <button id="cancelDelete" class="btn btn-secondary">Cancel</button>
        <button id="confirmDelete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
